# gRPC Provider 配置示例（vLLM / TGI 等）
# 敏感字段外置到 .env.vllm 文件

server:
  listenAddr: ":8083"
  readTimeout: 30
  writeTimeout: 300

database:
  driver: sqlite
  dsn: gateyes-grpc.db
  autoMigrate: true
  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifetimeSeconds: 300

metrics:
  namespace: gateway
  enabled: true

router:
  strategy: round_robin

limiter:
  globalQPS: 1000
  globalTPM: 1000000
  globalTokenBurst: 100000
  perUserRequestBurst: 100
  queueSize: 1000

alert:
  enabled: true
  quotaThreshold: 0.8

healthCheck:
  enabled: true
  intervalSeconds: 60
  timeoutSeconds: 15
  failureThreshold: 2

retry:
  maxRetries: 2
  initialDelayMs: 100
  maxDelayMs: 5000
  backoffFactor: 2.0

circuitBreaker:
  failureThreshold: 5
  recoveryTimeout: 60
  halfOpenMaxRequests: 1

providers:
  - name: vllm-grpc-qwen
    type: grpc
    vendor: vllm
    grpcUseTLS: false
    grpcAuthority: ""
    priceInput: 0
    priceOutput: 0
    maxTokens: 131072
    timeout: 120
    enabled: true
    envFile: .env.vllm
    headers:
      x-tenant: gateyes-live

apiKeys:
  - key: bootstrap-key-001
    secret: bootstrap-secret-001
    quota: 1000000
    qps: 1000
    models: []

admin:
  defaultTenant: default
  bootstrapKey: admin-key-001
  bootstrapSecret: admin-secret-001
