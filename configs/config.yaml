server:
  listenAddr: ":8080"
  readTimeout: 30
  writeTimeout: 300

database:
  driver: sqlite
  dsn: gateyes.db
  autoMigrate: true
  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifetimeSeconds: 300

metrics:
  namespace: gateway
  enabled: true

router:
  strategy: round_robin
  stickySession: false

limiter:
  globalQPS: 1000
  globalTPM: 1000000
  burst: 100
  queueSize: 1000

cache:
  enabled: true
  maxSize: 10000
  ttl: 3600

providers:
  - name: openai-primary
    type: openai
    baseURL: https://api.openai.com/v1
    apiKey: ${OPENAI_API_KEY}
    model: gpt-4o-mini
    weight: 10
    priceInput: 0
    priceOutput: 0
    maxTokens: 4096
    timeout: 60
    enabled: true

  - name: anthropic-primary
    type: anthropic
    baseURL: https://api.anthropic.com
    apiKey: ${ANTHROPIC_API_KEY}
    model: claude-3-5-sonnet-latest
    weight: 10
    priceInput: 0
    priceOutput: 0
    maxTokens: 4096
    timeout: 60
    enabled: false

apiKeys:
  - key: test-key-001
    secret: test-secret
    quota: 1000000
    qps: 100
    models: []

admin:
  defaultTenant: default
  bootstrapKey: admin-key-001
  bootstrapSecret: admin-secret-001
