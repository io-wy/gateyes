server:
  listenAddr: ":8082"
  readTimeout: 30
  writeTimeout: 300

database:
  driver: sqlite
  dsn: gateyes.db
  autoMigrate: true
  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifetimeSeconds: 300

metrics:
  namespace: gateway
  enabled: true

router:
  strategy: round_robin
  stickySession: false

limiter:
  globalQPS: 1000
  globalTPM: 1000000
  burst: 100
  queueSize: 1000

cache:
  enabled: true
  maxSize: 10000
  ttl: 3600

providers:
  - name: longcat-primary
    type: openai
    baseURL: https://api.longcat.chat/openai
    endpoint: chat
    apiKey: ak_26z4wO9fK7je7yJ34R6vP9Wu2Bx3b
    model: LongCat-Flash-Thinking
    weight: 10
    priceInput: 0
    priceOutput: 0
    maxTokens: 4096
    timeout: 60
    enabled: true

apiKeys:
  - key: test-key-001
    secret: test-secret
    quota: 1000000
    qps: 100
    models: []

admin:
  defaultTenant: default
  bootstrapKey: admin-key-001
  bootstrapSecret: admin-secret-001
