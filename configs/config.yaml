server:
  listenAddr: ":8083"
  readTimeout: 30
  writeTimeout: 300

database:
  driver: sqlite
  dsn: gateyes.db
  autoMigrate: true
  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifetimeSeconds: 300

metrics:
  namespace: gateway
  enabled: true

router:
  strategy: round_robin

limiter:
  globalQPS: 1000
  globalTPM: 1000000
  globalTokenBurst: 100000
  perUserRequestBurst: 100
  queueSize: 1000

alert:
  enabled: true
  quotaThreshold: 0.8
  webhookURL: ""
  webhookSecret: ""
  providerStateURL: ""
  budgetExhaustedURL: ""
  requestEventURL: ""
  errorEventURL: ""

healthCheck:
  enabled: true
  intervalSeconds: 60
  timeoutSeconds: 15
  failureThreshold: 2

retry:
  maxRetries: 2
  initialDelayMs: 100
  maxDelayMs: 5000
  backoffFactor: 2.0

circuitBreaker:
  failureThreshold: 5
  recoveryTimeout: 60
  halfOpenMaxRequests: 1

providers:
  # 敏感字段（apiKey / baseURL / model 等）可外置到 .env 文件
  # 方式 1：不指定 envFile，自动按顺序读取 .env1, .env2...
  # 方式 2：显式指定 envFile: .env.openai
  - name: openai-primary
    type: openai
    endpoint: responses
    priceInput: 0.000005
    priceOutput: 0.000015
    maxTokens: 16384
    timeout: 60
    enabled: true

  - name: anthropic-primary
    type: anthropic
    priceInput: 0.000003
    priceOutput: 0.000015
    maxTokens: 16384
    timeout: 60
    enabled: true

apiKeys:
  - key: ${GATEYES_BOOTSTRAP_TEST_KEY}
    secret: ${GATEYES_BOOTSTRAP_TEST_SECRET}
    quota: 1000000
    qps: 1000
    models: []

admin:
  defaultTenant: default
  bootstrapKey: ${GATEYES_ADMIN_BOOTSTRAP_KEY}
  bootstrapSecret: ${GATEYES_ADMIN_BOOTSTRAP_SECRET}
