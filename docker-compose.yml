version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: gateyes:local
    env_file:
      - .env
    command: ["-config", "/app/configs/config.example.yaml"]
    ports:
      - "8083:8083"
    volumes:
      - gateyes-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/ready >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/grafana-dashboard.json:/var/lib/grafana/dashboards/gateyes.json:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  gateyes-data:
  prometheus-data:
  grafana-data:
