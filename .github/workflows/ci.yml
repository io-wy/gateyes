name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_API_KEY: test-openai-key
      OPENAI_MODEL: gpt-4o-mini
      ANTHROPIC_BASE_URL: https://api.anthropic.com
      ANTHROPIC_API_KEY: test-anthropic-key
      ANTHROPIC_MODEL: claude-3-5-sonnet-latest
      GATEYES_BOOTSTRAP_TEST_KEY: test-key-001
      GATEYES_BOOTSTRAP_TEST_SECRET: test-secret
      GATEYES_ADMIN_BOOTSTRAP_KEY: admin-key-001
      GATEYES_ADMIN_BOOTSTRAP_SECRET: admin-secret-001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Check formatting (advisory)
        run: |
          files="$(find . -name '*.go' -not -path './.gotools/*' -not -path './.gocache/*' -not -path './.gomodcache/*')"
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "::warning::Unformatted files: $unformatted"
          fi

      - name: Unit tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Migration smoke test
        run: go run ./cmd/migrate -config configs/config.example.yaml -action up

      - name: Govulncheck (advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: OpenAPI smoke check (advisory)
        continue-on-error: true
        shell: pwsh
        run: ./scripts/check-openapi.ps1

      - name: Secret scan (advisory)
        continue-on-error: true
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          "$(go env GOPATH)/bin/gitleaks" detect --source=. --no-git --no-banner

      - name: Trivy filesystem scan (advisory)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true
